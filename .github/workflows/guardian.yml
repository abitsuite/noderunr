# =============================================================================
# NodΞRunr — Guardian and Test Suite
# =============================================================================
#
# Triggers:
#   - Push to master
#
# Purpose:
#   Fast CI feedback — runs the full test suite to verify that master is
#   healthy after every commit. No builds, no artifacts, no releases.
#
# =============================================================================

name: Guardian

on:
  push:
    branches:
      - master

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:

  # ===========================================================================
  # Guardian and Test Suite
  # ===========================================================================
  test:
    name: Guardian and Test Suite
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-test-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            linux-test-cargo-

      - name: Run tests
        run: cargo test --verbose

      - name: Run clippy lints
        run: cargo clippy -- -D warnings

      - name: Check formatting
        run: cargo fmt --check

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage report
        run: cargo tarpaulin --out xml --output-dir coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: abitsuite/noderunr
          files: coverage/cobertura.xml
          fail_ci_if_error: false
          verbose: true

  # ===========================================================================
  # Windows Smoke Test
  # ===========================================================================
  test-windows:
    name: Windows Smoke Test
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-test-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-test-cargo-

      - name: Run tests
        run: cargo test --verbose
