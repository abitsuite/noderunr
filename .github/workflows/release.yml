# =============================================================================
# NodΞRunr — Release Pipeline
# =============================================================================
#
# Triggers:
#   - Tag push (v*)
#
# Purpose:
#   Build release binaries for all supported platforms and publish a GitHub
#   Release with attached assets and SHA256 checksums.
#
# Targets:
#   - Windows         (x86_64-pc-windows-msvc)
#   - macOS Universal (x86_64-apple-darwin + aarch64-apple-darwin → universal binary)
#   - Linux           (x86_64-unknown-linux-gnu, Ubuntu 24.04)
#
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: noderunr

jobs:

  # ===========================================================================
  # Test Suite — gate the release on passing tests
  # ===========================================================================
  test:
    name: Test Suite
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-test-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            linux-test-cargo-

      - name: Run tests
        run: cargo test --verbose

  # ===========================================================================
  # Build — Windows (x86_64)
  # ===========================================================================
  build-windows:
    name: Build — Windows (x86_64)
    needs: [test]
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-x86_64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-x86_64-cargo-

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          cp target/x86_64-pc-windows-msvc/release/${BINARY_NAME}.exe dist/
          cd dist
          7z a ../${BINARY_NAME}-windows-x86_64.zip ${BINARY_NAME}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.BINARY_NAME }}-windows-x86_64
          path: ${{ env.BINARY_NAME }}-windows-x86_64.zip
          if-no-files-found: error

  # ===========================================================================
  # Build — macOS Universal (x86_64 + aarch64)
  # ===========================================================================
  build-macos:
    name: Build — macOS (Universal)
    needs: [test]
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-universal-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-universal-cargo-

      - name: Build release binary (x86_64)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build release binary (aarch64)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create universal binary with lipo
        run: |
          mkdir -p dist
          lipo -create \
            target/x86_64-apple-darwin/release/${BINARY_NAME} \
            target/aarch64-apple-darwin/release/${BINARY_NAME} \
            -output dist/${BINARY_NAME}
          chmod +x dist/${BINARY_NAME}

      - name: Verify universal binary
        run: |
          file dist/${BINARY_NAME}
          lipo -info dist/${BINARY_NAME}

      - name: Package artifact
        run: |
          cd dist
          tar czf ../${BINARY_NAME}-macos-universal.tar.gz ${BINARY_NAME}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.BINARY_NAME }}-macos-universal
          path: ${{ env.BINARY_NAME }}-macos-universal.tar.gz
          if-no-files-found: error

  # ===========================================================================
  # Build — Linux (x86_64, Ubuntu 24.04)
  # ===========================================================================
  build-linux:
    name: Build — Linux (x86_64, Ubuntu 24.04)
    needs: [test]
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-x86_64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            linux-x86_64-cargo-

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/${BINARY_NAME} dist/
          chmod +x dist/${BINARY_NAME}
          cd dist
          tar czf ../${BINARY_NAME}-linux-x86_64.tar.gz ${BINARY_NAME}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.BINARY_NAME }}-linux-x86_64
          path: ${{ env.BINARY_NAME }}-linux-x86_64.tar.gz
          if-no-files-found: error

  # ===========================================================================
  # Release — collect all artifacts and publish a GitHub Release
  # ===========================================================================
  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout source (for changelog context)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: List downloaded artifacts (debug)
        run: find artifacts -type f -ls

      - name: Collect release assets into a single directory
        run: |
          mkdir -p release-assets
          cp artifacts/${{ env.BINARY_NAME }}-windows-x86_64/${{ env.BINARY_NAME }}-windows-x86_64.zip     release-assets/
          cp artifacts/${{ env.BINARY_NAME }}-macos-universal/${{ env.BINARY_NAME }}-macos-universal.tar.gz release-assets/
          cp artifacts/${{ env.BINARY_NAME }}-linux-x86_64/${{ env.BINARY_NAME }}-linux-x86_64.tar.gz       release-assets/

      - name: Generate SHA256 checksums
        working-directory: release-assets
        run: |
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Determine release tag
        id: meta
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog body
        id: changelog
        shell: bash
        run: |
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          PREVIOUS_TAG="$(git tag --sort=-v:refname | grep -E '^v' | sed -n '2p')"

          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)

          {
            echo "body<<${EOF_MARKER}"

            if [ -n "${PREVIOUS_TAG}" ]; then
              echo "## Changes since ${PREVIOUS_TAG}"
              echo ""
              git log "${PREVIOUS_TAG}..${CURRENT_TAG}" --pretty=format:"- %s (%h)" --no-merges
            else
              echo "## Initial Release"
              echo ""
              git log --pretty=format:"- %s (%h)" --no-merges -20
            fi

            echo ""
            echo ""
            echo "---"
            echo ""
            echo "### Artifacts"
            echo ""
            echo "| Platform | File |"
            echo "|----------|------|"
            echo "| Windows (x86_64) | \`${BINARY_NAME}-windows-x86_64.zip\` |"
            echo "| macOS (Universal) | \`${BINARY_NAME}-macos-universal.tar.gz\` |"
            echo "| Linux (x86_64, Ubuntu 24.04) | \`${BINARY_NAME}-linux-x86_64.tar.gz\` |"
            echo ""
            echo "Verify downloads with \`SHA256SUMS.txt\`."

            echo "${EOF_MARKER}"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.tag_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          files: |
            release-assets/${{ env.BINARY_NAME }}-windows-x86_64.zip
            release-assets/${{ env.BINARY_NAME }}-macos-universal.tar.gz
            release-assets/${{ env.BINARY_NAME }}-linux-x86_64.tar.gz
            release-assets/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
